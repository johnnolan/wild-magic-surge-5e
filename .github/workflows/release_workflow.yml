name: "[Workflow] Release"

on:
  release:
    types: [released]

jobs:
  create_changelog_commit:
    name: Create and commit Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ secrets.PAT }}

    - name: Update Changelog
      uses: stefanzweifel/changelog-updater-action@v1
      with:
        latest-version: ${{ github.event.release.tag_name }}
        release-notes: ${{ github.event.release.body }}

    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: '.nvmrc'

    - name: Cache yarn dependencies
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ./node_modules
        key: modules-${{ hashFiles('yarn.lock') }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: yarn install

    - name: Build Module
      run: yarn run build
    
    - name: Substitute Manifest and Download Links For Versioned Ones
      id: sub_manifest_link_version
      run: |
        jq --arg version "${{ github.event.release.tag_name }}" \
          --arg url "https://github.com/${{ github.repository }}" \
          --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
          --arg download "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip" \
          '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
          module.json > module.tmp.json && mv module.tmp.json module.json

    # Create a zip file with all files required by the module to add to the release
    - run: zip -r ./module.zip module.json CHANGELOG.md LICENSE dist/ styles/ languages/ templates/ packs/

    # Create a release for this specific version
    - name: Update Release with Files
      id: create_version_release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        name: ${{ github.event.release.name }}
        draft: ${{ github.event.release.unpublished }}
        prerelease: ${{ github.event.release.prerelease }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: './module.json, ./module.zip'
        body: ${{ github.event.release.body }}
        allowUpdates: true

    - name: Commit updated CHANGELOG
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
      with:
        branch: ${{ github.event.release.target_commitish }}
        commit_message: Update CHANGELOG
        file_pattern: CHANGELOG.md
