on:
  workflow_call:

jobs:
  publish_unit_tests:
    name: Publish Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Download Junit Artifact
        id: download_junit
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: junit
          path: test-results/junit

      - name: Download Clover Artifact
        id: download_clover
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: clover
          path: coverage

      - name: Download ESLint Artifact
        id: eslint_report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: eslint_report
          path: .

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          check_name: "Unit Test Results"
          junit_files: test-results/junit/results.xml

      - name: Coverage Report
        uses: lucassabreu/comment-coverage-clover@c0f074f770934003d14a2a90121da232e47f53c1 # v0.17.0
        with:
          file: "coverage/clover.xml"
          min-line-coverage: 80
          min-method-coverage: 80
